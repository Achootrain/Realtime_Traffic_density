name: Infrastructure & Deploy (K3s)

# ============================================
# Two-phase pipeline:
#   Job 1 — Terraform: provision/update infrastructure
#   Job 2 — Deploy:    apply K8s manifests & restart changed services
#
# Service registry: services.json (add new services there)
#
# Required GitHub Secrets:
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
#   SSH_PUBLIC_KEY, SSH_PRIVATE_KEY
#   EC2_INSTANCE_ID
#   GHCR_USERNAME, GHCR_TOKEN
# ============================================

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      service:
        description: "Service to restart (blank = auto-detect, 'all' = everything)"
        type: string
        required: false
        default: ""
      skip_terraform:
        description: "Skip Terraform (deploy services only)?"
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

# ============================================
# Job 1: Infrastructure (Terraform)
# ============================================
jobs:
  infrastructure:
    if: ${{ github.event.inputs.skip_terraform != 'true' }}
    runs-on: ubuntu-latest

    outputs:
      ec2_instance_id: ${{ steps.tf_output.outputs.ec2_instance_id }}
      ec2_public_ip:   ${{ steps.tf_output.outputs.ec2_public_ip }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Write SSH keys
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
        run: |
          mkdir -p /tmp/ssh
          echo "${SSH_PRIVATE_KEY}" > /tmp/ssh/id_rsa
          echo "${SSH_PUBLIC_KEY}"  > /tmp/ssh/id_rsa.pub
          chmod 600 /tmp/ssh/id_rsa

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: terraform
        run: |
          terraform plan -out=tfplan \
            -var 'ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}' \
            -var 'ssh_private_key=${{ secrets.SSH_PRIVATE_KEY }}'

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve tfplan

      - name: Export Terraform outputs
        id: tf_output
        working-directory: terraform
        run: |
          echo "ec2_instance_id=$(terraform output -raw ec2_instance_id)" >> "$GITHUB_OUTPUT"
          echo "ec2_public_ip=$(terraform output -raw ec2_public_ip)"     >> "$GITHUB_OUTPUT"

      - name: Cleanup SSH keys
        if: always()
        run: rm -rf /tmp/ssh

  # ============================================
  # Job 2: Deploy Services (SSM)
  # ============================================
  deploy-services:
    needs: infrastructure
    if: ${{ always() && (needs.infrastructure.result == 'success' || needs.infrastructure.result == 'skipped') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Lowercase Repo Owner
        run: echo "REPO_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> ${GITHUB_ENV}

      - name: Detect changed services
        id: detect
        run: bash .github/scripts/detect-changes.sh "${{ github.event.inputs.service }}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Resolve EC2 Instance ID
        id: resolve_ec2
        run: |
          INSTANCE_ID="${{ needs.infrastructure.outputs.ec2_instance_id }}"
          if [[ -z "$INSTANCE_ID" ]]; then
            INSTANCE_ID="${{ secrets.EC2_INSTANCE_ID }}"
          fi
          echo "instance_id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"

      - name: Write deploy secrets
        run: |
          cat > /tmp/.deploy-secrets << EOF
          export GHCR_USERNAME="${{ secrets.GHCR_USERNAME }}"
          export GHCR_TOKEN="${{ secrets.GHCR_TOKEN }}"
          export AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}"
          export AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}"
          EOF

      - name: Deploy via SSM
        env:
          S3_BUCKET_NAME: traffic-count-bigdata
        run: |
          bash .github/scripts/ssm-deploy.sh \
            "${{ steps.resolve_ec2.outputs.instance_id }}" \
            "${{ steps.detect.outputs.services }}"

      - name: Cleanup secrets
        if: always()
        run: rm -f /tmp/.deploy-secrets