name: Infrastructure & Deploy (K3s)

# ============================================
# Two-phase pipeline:
#   Job 1 — Terraform: provision/update infrastructure
#   Job 2 — Deploy:    apply K8s manifests & restart changed services
#
# Service registry: services.json (add new services there)
#
# Enviroment variables:
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
#   SSH_PUBLIC_KEY, SSH_PRIVATE_KEY
#   EC2_INSTANCE_ID
#   GHCR_USERNAME, GHCR_TOKEN
# ============================================

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      service:
        description: "Service to restart (blank = auto-detect from diff, 'all' = restart everything)"
        type: string
        required: false
        default: ""
      skip_terraform:
        description: "Skip Terraform (deploy services only)?"
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

# ============================================
# Job 1: Infrastructure (Terraform)
# ============================================
jobs:
  infrastructure:
    if: ${{ github.event.inputs.skip_terraform != 'true' }}
    runs-on: ubuntu-latest

    outputs:
      ec2_instance_id: ${{ steps.tf_output.outputs.ec2_instance_id }}
      ec2_public_ip:   ${{ steps.tf_output.outputs.ec2_public_ip }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Write SSH keys
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
        run: |
          mkdir -p /tmp/ssh
          echo "${SSH_PRIVATE_KEY}" > /tmp/ssh/id_rsa
          echo "${SSH_PUBLIC_KEY}"  > /tmp/ssh/id_rsa.pub
          chmod 600 /tmp/ssh/id_rsa

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: terraform
        run: |
          terraform plan -out=tfplan \
            -var 'ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}' \
            -var 'ssh_private_key=${{ secrets.SSH_PRIVATE_KEY }}'

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve tfplan

      - name: Export Terraform outputs
        id: tf_output
        working-directory: terraform
        run: |
          echo "ec2_instance_id=$(terraform output -raw ec2_instance_id)" >> "$GITHUB_OUTPUT"
          echo "ec2_public_ip=$(terraform output -raw ec2_public_ip)"     >> "$GITHUB_OUTPUT"

      - name: Cleanup SSH keys
        if: always()
        run: rm -rf /tmp/ssh

  # ============================================
  # Job 2: Deploy Services (SSM)
  # ============================================
  deploy-services:
    needs: infrastructure
    if: ${{ always() && (needs.infrastructure.result == 'success' || needs.infrastructure.result == 'skipped') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need HEAD^ for diff

      - name: Lowercase Repo Owner
        run: |
          echo "REPO_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> ${GITHUB_ENV}

      # -----------------------------------------------
      # Fix Windows line endings in config files
      # -----------------------------------------------
      - name: Fix line endings
        run: |
          sed -i 's/\r$//' services.json
          sed -i '1s/^\xEF\xBB\xBF//' services.json

      # -----------------------------------------------
      # Detect which services changed (data-driven)
      # -----------------------------------------------
      - name: Detect changed services
        id: detect
        shell: bash
        run: |
          set -e
          MANUAL_SERVICE="${{ github.event.inputs.service }}"

          if [[ -n "$MANUAL_SERVICE" ]]; then
            # Manual trigger — use the specified service(s)
            echo "services=$MANUAL_SERVICE" >> "$GITHUB_OUTPUT"
            echo ">>> Manual target: $MANUAL_SERVICE"
          else
            # Auto-detect from git diff using services.json
            CHANGED_FILES=$(git diff --name-only HEAD^ HEAD 2>/dev/null || echo "")
            CHANGED_SERVICES=""

            # Read each service's source_dir from services.json
            for row in $(jq -c '.services[]' services.json); do
              SVC_NAME=$(echo "$row" | jq -r '.name')
              SRC_DIR=$(echo "$row" | jq -r '.source_dir')

              # Check if any changed file starts with source_dir
              if echo "$CHANGED_FILES" | grep -q "^${SRC_DIR}"; then
                CHANGED_SERVICES="${CHANGED_SERVICES}${CHANGED_SERVICES:+,}${SVC_NAME}"
              fi
            done

            # If k8s/ manifests changed, deploy all
            if echo "$CHANGED_FILES" | grep -q "^k8s/"; then
              CHANGED_SERVICES="all"
            fi

            # Default: deploy all if nothing specific detected
            if [[ -z "$CHANGED_SERVICES" ]]; then
              CHANGED_SERVICES="all"
            fi

            echo "services=$CHANGED_SERVICES" >> "$GITHUB_OUTPUT"
            echo ">>> Auto-detected: $CHANGED_SERVICES"
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Resolve EC2 Instance ID
        id: resolve_ec2
        run: |
          INSTANCE_ID="${{ needs.infrastructure.outputs.ec2_instance_id }}"
          if [[ -z "$INSTANCE_ID" ]]; then
            INSTANCE_ID="${{ secrets.EC2_INSTANCE_ID }}"
          fi
          echo "instance_id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"

      # -----------------------------------------------
      # Generate deploy script (data-driven from services.json)
      # -----------------------------------------------
      - name: Generate deploy script
        run: |
          CHANGED="${{ steps.detect.outputs.services }}"

          cat > /tmp/deploy.sh << 'DEPLOY_SCRIPT_EOF'
          #!/bin/bash
          set -e
          export KUBECONFIG=/home/ubuntu/.kube/config
          export HOME=/home/ubuntu

          CHANGED_SERVICES="$1"
          echo ">>> Services to restart: $CHANGED_SERVICES"

          cd /home/ubuntu/k8s

          # ---- Fix Windows line endings ----
          sed -i 's/\r$//' /home/ubuntu/services.json 2>/dev/null || true

          # ---- Resolve EC2 public IP for Kafka (IMDSv2) ----
          IMDS_TOKEN=$(curl -sf -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 60" || true)
          EC2_HOST=$(curl -sf -H "X-aws-ec2-metadata-token: $IMDS_TOKEN" http://169.254.169.254/latest/meta-data/public-ipv4 || echo "127.0.0.1")
          sed -i "s/IP_PLACEHOLDER/$EC2_HOST/g" kafka.yaml || true

          # ---- Setup Helm ----
          if ! command -v helm &> /dev/null; then
            curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          fi

          # ---- Helm repos from services.json ----
          if [ -f /home/ubuntu/services.json ]; then
            for repo in $(jq -r '.helm_repos | to_entries[] | "\(.key)=\(.value)"' /home/ubuntu/services.json); do
              REPO_NAME="${repo%%=*}"
              REPO_URL="${repo#*=}"
              helm repo add "$REPO_NAME" "$REPO_URL" || true
            done
            helm repo update
          fi

          # ---- Create namespace ----
          kubectl create namespace traffic --dry-run=client -o yaml | kubectl apply -f -

          DEPLOY_SCRIPT_EOF

          # Append lines with secrets (outside heredoc for variable expansion)
          cat >> /tmp/deploy.sh << EOF
          # ---- Create secrets ----
          kubectl create secret docker-registry ghcr-secret \\
            --namespace traffic \\
            --docker-server=ghcr.io \\
            --docker-username="${{ secrets.GHCR_USERNAME }}" \\
            --docker-password="${{ secrets.GHCR_TOKEN }}" \\
            --docker-email="noreply@example.com" \\
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic aws-credentials \\
            --namespace traffic \\
            --from-literal=access_key_id="${{ secrets.AWS_ACCESS_KEY_ID }}" \\
            --from-literal=secret_access_key="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \\
            --dry-run=client -o yaml | kubectl apply -f -

          # ---- Helm releases from services.json ----
          if [ -f /home/ubuntu/services.json ]; then
            for release in \$(jq -c '.helm_releases[]' /home/ubuntu/services.json); do
              REL_NAME=\$(echo "\$release" | jq -r '.name')
              REL_CHART=\$(echo "\$release" | jq -r '.chart')
              SET_FLAGS=""
              for kv in \$(echo "\$release" | jq -r '.set | to_entries[] | "--set \(.key)=\(.value)"'); do
                SET_FLAGS="\$SET_FLAGS \$kv"
              done
              echo ">>> Installing Helm release: \$REL_NAME"
              helm upgrade --install "\$REL_NAME" "\$REL_CHART" --namespace traffic \$SET_FLAGS
            done
          fi

          # ---- Apply all manifests via Kustomize ----
          kubectl apply -k .

          # ---- Post-deploy: TimescaleDB init ----
          kubectl wait --for=condition=ready pod/timescaledb-0 -n traffic --timeout=120s || true
          if [ -f /home/ubuntu/timescaledb/init.sql ]; then
            kubectl cp /home/ubuntu/timescaledb/init.sql traffic/timescaledb-0:/tmp/init.sql
            kubectl exec timescaledb-0 -n traffic -- psql -U postgres -d traffic -f /tmp/init.sql || true
          fi

          # ---- Restart changed services (data-driven) ----
          if [ -f /home/ubuntu/services.json ]; then
            for svc in \$(jq -c '.services[]' /home/ubuntu/services.json); do
              SVC_NAME=\$(echo "\$svc" | jq -r '.name')

              # Check if this service should be restarted
              if [[ "\$CHANGED_SERVICES" == "all" ]] || echo "\$CHANGED_SERVICES" | grep -qw "\$SVC_NAME"; then
                echo ">>> Restarting service: \$SVC_NAME"
                for cmd in \$(echo "\$svc" | jq -r '.restart[]' | base64 -w0); do
                  DECODED=\$(echo "\$cmd" | base64 -d)
                  echo "    Running: \$DECODED"
                  eval "\$DECODED" || true
                done
              fi
            done
          fi

          echo ">>> Deploy complete!"
          EOF

          chmod +x /tmp/deploy.sh
          sed -i 's/^          //' /tmp/deploy.sh

      # -----------------------------------------------
      # Upload & execute via SSM
      # -----------------------------------------------
      - name: Upload bundle via SSM
        run: |
          EC2_ID="${{ steps.resolve_ec2.outputs.instance_id }}"
          tar czf /tmp/deploy-bundle.tar.gz k8s/*.yaml timescaledb/init.sql clean.sh services.json -C /tmp deploy.sh

          BUNDLE_B64=$(base64 -w0 /tmp/deploy-bundle.tar.gz)
          BUNDLE_SIZE=$(stat -c%s /tmp/deploy-bundle.tar.gz)
          echo "Bundle size: $BUNDLE_SIZE bytes"

          if [ "$BUNDLE_SIZE" -gt 20000 ]; then
            echo "Bundle too large for inline SSM, uploading to S3..."
            BUCKET="${{ secrets.S3_BUCKET_NAME || 'traffic-count-bigdata' }}"
            aws s3 cp /tmp/deploy-bundle.tar.gz "s3://${BUCKET}/deploy/deploy-bundle.tar.gz"
            COMMAND_ID=$(aws ssm send-command \
              --instance-ids "$EC2_ID" \
              --document-name "AWS-RunShellScript" \
              --timeout-seconds 60 \
              --parameters commands='["mkdir -p /home/ubuntu/k8s /home/ubuntu/timescaledb","aws s3 cp s3://'"${BUCKET}"'/deploy/deploy-bundle.tar.gz /tmp/deploy-bundle.tar.gz","cd /home/ubuntu && tar xzf /tmp/deploy-bundle.tar.gz","chmod +x /home/ubuntu/clean.sh /home/ubuntu/deploy.sh","rm -f /tmp/deploy-bundle.tar.gz"]' \
              --query "Command.CommandId" --output text)
          else
            COMMAND_ID=$(aws ssm send-command \
              --instance-ids "$EC2_ID" \
              --document-name "AWS-RunShellScript" \
              --timeout-seconds 60 \
              --parameters commands="[\"mkdir -p /home/ubuntu/k8s /home/ubuntu/timescaledb\",\"echo '${BUNDLE_B64}' | base64 -d > /tmp/deploy-bundle.tar.gz\",\"cd /home/ubuntu && tar xzf /tmp/deploy-bundle.tar.gz\",\"chmod +x /home/ubuntu/clean.sh /home/ubuntu/deploy.sh\",\"rm -f /tmp/deploy-bundle.tar.gz\"]" \
              --query "Command.CommandId" --output text)
          fi

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_ID" || true

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_ID" \
            --query "Status" --output text)

          if [[ "$STATUS" != "Success" ]]; then
            echo "Upload failed with status: $STATUS"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$EC2_ID" \
              --query "StandardErrorContent" --output text
            exit 1
          fi
          echo "Bundle uploaded successfully"

      - name: Deploy on K3s via SSM
        run: |
          EC2_ID="${{ steps.resolve_ec2.outputs.instance_id }}"
          CHANGED="${{ steps.detect.outputs.services }}"
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$EC2_ID" \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 300 \
            --parameters commands='["bash /home/ubuntu/deploy.sh '"$CHANGED"'"]' \
            --query "Command.CommandId" --output text)

          echo "SSM Command ID: $COMMAND_ID"
          echo "Deploying services: $CHANGED"
          echo "Waiting for deployment to complete..."

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_ID" || true

          RESULT=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_ID")

          STATUS=$(echo "$RESULT" | jq -r '.Status')
          echo "Command Status: $STATUS"
          echo "--- STDOUT ---"
          echo "$RESULT" | jq -r '.StandardOutputContent'
          echo "--- STDERR ---"
          echo "$RESULT" | jq -r '.StandardErrorContent'

          if [[ "$STATUS" != "Success" ]]; then
            echo "Deployment failed!"
            exit 1
          fi

          echo "Deployment successful!"